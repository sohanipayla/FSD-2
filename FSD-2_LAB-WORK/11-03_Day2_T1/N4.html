<!-- Font Increase -->
 <html>
    <head></head>
    <body>
        <p id="p1">Hello World</p>
        <button onclick="fun1()">Click Me</button>
        <script>
            font="15"
            function fun(){
                p1.style.fontSize=font;
            }
            function fun1(){
                setInterval(function(){
                    if(font<50){
                        fun(font++);
                    }
                },50)
            }

        </script>
    </body>
 </html>
